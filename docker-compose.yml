services:
  db:
    image: postgres:16-alpine
    container_name: content_ai_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres_pass}
      POSTGRES_DB: ${DB_NAME:-content_ai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Internal-only. Достижим по имени `db:5432` для всех на content_ai_net.
    # НЕ публикуется наружу. Для локального psql временно раскомментируйте loopback:
    # ports:
    #   - "127.0.0.1:5432:5432"
    expose:
      - "5432"
    # Healthcheck — чтобы admin-api/bot стартовали только когда Postgres реально
    # принимает соединения (depends_on без этого ждёт лишь старт контейнера, а не
    # готовность БД → гонка и краш-луп на первом запуске).
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-content_ai}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - content_ai_net

  bot:
    build: .
    container_name: content_ai_bot
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres_pass}@db:5432/${DB_NAME:-content_ai}
      # Внутренний API (publish / publish-all / collect-metrics). Бот на bridge-сети,
      # порт 8002 НЕ публикуется — биндим 0.0.0.0 внутри контейнера, снаружи он
      # недостижим, а admin-api ходит по имени `bot:8002` внутри content_ai_net.
      - INTERNAL_API_HOST=0.0.0.0
      # RAG в отдельном compose, подключённом к той же внешней сети как `rag-api`.
      - RAG_URL=http://rag-api:8000
    volumes:
      - ./gen_images:/app/gen_images
    # bot.log НЕ монтируем файлом: на свежем сервере хоста-файла нет, и Docker
    # создаёт его КАТАЛОГОМ → FileHandler падает с IsADirectoryError. Логи и так
    # идут в stdout (StreamHandler) и доступны через `docker logs`.
    networks:
      - content_ai_net

  admin-api:
    build:
      context: .
      dockerfile: admin-api/Dockerfile
    container_name: content_ai_admin_api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    # Internal-only. Наружу НЕ публикуется: единственный публичный edge — nginx,
    # который проксирует сюда по имени `admin-api:8001`. db / rag / bot достижимы
    # по именам сервисов внутри content_ai_net. Для локального curl/debug временно:
    # ports:
    #   - "127.0.0.1:8001:8001"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres_pass}@db:5432/${DB_NAME:-content_ai}
      - RAG_URL=http://rag-api:8000
      - INTERNAL_BOT_URL=http://bot:8002
    expose:
      - "8001"
    networks:
      - content_ai_net

  # Единственный публичный edge. Только nginx публикует порты наружу (80/443);
  # admin-api / db / rag / bot-api остаются приватными внутри content_ai_net.
  # TLS терминируется здесь (см. nginx/nginx.conf).
  nginx:
    image: nginx:1.27-alpine
    container_name: content_ai_nginx
    restart: always
    depends_on:
      - admin-api
    environment:
      # Подставляется в nginx.conf.template (envsubst образа nginx). Берётся из .env.
      - DOMAIN=${DOMAIN}
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./nginx/letsencrypt:/etc/letsencrypt
      - ./nginx/www:/var/www/certbot
    ports:
      - "80:80"
      - "443:443"
    networks:
      - content_ai_net
    # Перечитываем конфиг каждые 6ч, чтобы подхватить продлённый certbot сертификат.
    command: >-
      /bin/sh -c "while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g 'daemon off;'"

  # Let's Encrypt: авто-продление сертификата (webroot http-01). Первичную выдачу
  # делает ./init-letsencrypt.sh; этот сервис лишь крутит renew раз в 12ч.
  certbot:
    image: certbot/certbot:latest
    container_name: content_ai_certbot
    restart: always
    volumes:
      - ./nginx/letsencrypt:/etc/letsencrypt
      - ./nginx/www:/var/www/certbot
    entrypoint: >-
      /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done"

# Общая внешняя сеть. Граница безопасности = «состоит ли контейнер в этой сети»,
# а не IP/интерфейс. Внутренние сервисы (db/rag/bot-api/admin-api) не публикуют
# портов вовсе — наружу торчит только nginx. RAG-проект (отдельный compose)
# подключается к ЭТОЙ ЖЕ сети, поэтому она external и создаётся один раз:
#   docker network create content_ai_net
networks:
  content_ai_net:
    external: true
    name: content_ai_net

volumes:
  postgres_data:
