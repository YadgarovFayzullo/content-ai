# Публичный edge content-ai. Единственный сервис, торчащий в интернет.
# Проксирует на admin-api по bridge-DNS (admin-api:8001) — сам admin-api
# наружу не опубликован. db / rag / bot-api недоступны отсюда вовсе.

upstream admin_api {
    server admin-api:8001;
}

# --- HTTP :80 ---------------------------------------------------------------
# Пока нет TLS-сертификатов, обслуживаем на 80. Когда появятся сертификаты —
# замените этот сервер на редирект 80→443 (см. закомментированный блок ниже).
server {
    listen 80;
    server_name _;

    # Тело запросов с превью/генерацией может быть крупным.
    client_max_body_size 10m;

    location / {
        proxy_pass http://admin_api;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

